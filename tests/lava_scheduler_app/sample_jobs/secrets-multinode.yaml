job_name: Secrets with multinode
timeouts:
  job:
    minutes: 60
  action:
    minutes: 5
  connection:
    minutes: 2
priority: medium
visibility: public

secrets:
  foo: bar

protocols:
  lava-multinode:
    roles:
      client:
        count: 1
        device_type: docker
      server:
        count: 1
        device_type: docker

actions:
- deploy:
    role:
    - client
    to: docker
    image:
      name: alpine:latest

- boot:
    role:
      - client
    command: bash
    method: docker
    prompts:
      - '#'
    timeout:
      minutes: 30

- deploy:
    role:
    - server
    to: docker
    image:
      name: alpine:latest

- boot:
    role:
      - server
    command: bash
    method: docker
    prompts:
      - '#'
    timeout:
      minutes: 30

- test:
   role:
     - client
   definitions:
   - from: inline
     name: test-secret
     path: inline/test-secret.yaml
     repository:
       metadata:
         name: test-secret
         description: test if we can find a secret
         format: Lava-Test Test Definition 1.0
       run:
         steps:
          - lava_dir="$(find /lava-* -maxdepth 0 -type d | grep -E '^/lava-[0-9]+' 2>/dev/null | sort | tail -1)"
          - . "$lava_dir/secrets"

- test:
   role:
     - server
   definitions:
   - from: inline
     name: test-secret
     path: inline/test-secret.yaml
     repository:
       metadata:
         name: test-secret
         description: test if we can find a secret
         format: Lava-Test Test Definition 1.0
       run:
         steps:
          - lava_dir="$(find /lava-* -maxdepth 0 -type d | grep -E '^/lava-[0-9]+' 2>/dev/null | sort | tail -1)"
          - . "$lava_dir/secrets"

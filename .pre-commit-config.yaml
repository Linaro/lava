exclude: "^tests/lava_dispatcher/kernel-.*txt$|uv.lock"
minimum_pre_commit_version: "4.6.0"

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: debug-statements
      # Exclude LAVA automation SSH private key
      - id: detect-private-key
        exclude: |
          (?x)^(lava_dispatcher/dynamic_vm_keys/lava)$
      - id: check-toml
      # Uses yaml.parse() for syntax-only validation
      # The duplicated keys are intentional in LAVA test job definitions
      - id: check-yaml
        args: [ '--unsafe' ]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    - id: pyupgrade
      args: ["--py311-plus"]

  # - repo: https://github.com/UnknownPlatypus/djangofmt-pre-commit
  #   rev: v0.2.11
  #   hooks:
  #     - id: djangofmt

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.31.1
    hooks:
      - id: django-upgrade
        args: ["--target-version", "4.2"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [ "--fix", "--exit-non-zero-on-fix" ]
      - id: ruff-format

  - repo: https://github.com/pylint-dev/pylint
    rev: v4.0.6
    hooks:
      - id: pylint
        additional_dependencies:
          - "aiohttp==3.14.1"
          - "asgiref==3.11.1"
          - "celery==5.6.3"
          - "configobj==5.0.9"
          - "defusedxml==0.7.1"
          - "django-allauth==65.18.0"
          - "django-environ==0.14.0"
          - "django-filter==25.1"
          - "django-tables2==3.0.0"
          - "django==4.2.30"
          - "djangorestframework-filters==1.0.0.dev2"
          - "djangorestframework==3.17.1"
          - "drf-extensions==0.8.0"
          - "gunicorn==26.0.0"
          - "jinja2==3.1.6"
          - "junit-xml==1.9"
          - "more-itertools==11.1.0"
          - "pexpect==4.9.0"
          - "psycopg2-binary==2.9.12"
          - "pylint-django==2.7.0"
          - "pylint==4.0.6"
          - "python-magic==0.4.27"
          - "pyudev==0.24.4"
          - "pyyaml==6.0.3"
          - "pyzmq==27.1.0"
          - "requests==2.34.2"
          - "sentry-sdk==2.63.0"
          - "setproctitle==1.3.7"
          - "tap-py==3.2.1"
          - "voluptuous==0.16.0"
          - "whitenoise==6.12.0"
        args:
          - "--verbose"
          - "--load-plugins=pylint_django"
          - "--django-settings-module=lava_server.settings.dev"
          - "lava/"
          - "lava/dispatcher/lava-run"
          - "lava/dispatcher/lava-worker"
          - "lava_common/"
          - "lava_dispatcher/"
          - "lava_dispatcher_host/"
          - "lava_rest_app/"
          - "lava_results_app/"
          - "lava_scheduler_app/"
          - "lava_server/"
          - "linaro_django_xmlrpc/"
          - "share/"
          - "tests/"
        pass_filenames: false
        always_run: true

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - "tomli==2.4.1"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        additional_dependencies:
          - "bandit[toml]"
        args:
          - "--configfile=pyproject.toml"
          - "--severity-level=medium"

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "django-stubs==6.0.6"
          - "jinja2==3.1.6"
          - "python-magic==0.4.27"
          - "pyyaml==6.0.3"
          - "requests==2.34.2"
          - "sentry-sdk==2.63.0"
          - "types-pexpect==4.9.0.20260518"
          - "types-pyyaml==6.0.12.20260518"
          - "types-requests==2.33.0.20260518"
        args:
          - "--python-version=3.11"
          - "--pretty"
          - "--strict"
          - "--follow-imports=silent"
          - "lava_common/constants.py"
          - "lava_common/converters.py"
          - "lava_common/decorators.py"
          - "lava_common/device_mappings.py"
          - "lava_common/exceptions.py"
          - "lava_common/jinja.py"
          - "lava_common/log.py"
          - "lava_common/timeout.py"
          - "lava_common/utils.py"
          - "lava_common/version.py"
          - "lava_common/worker.py"
          - "lava_common/yaml.py"
          - "lava_dispatcher/actions/base_strategy.py"
          - "lava_dispatcher/actions/boot_strategy.py"
          - "lava_dispatcher/actions/deploy_strategy.py"
          - "lava_dispatcher/actions/test/mixins.py"
          - "lava_dispatcher/actions/test_strategy.py"
          - "lava_dispatcher/connection.py"
          - "lava_dispatcher/deployment_data.py"
          - "lava_dispatcher/shell.py"
          - "lava_dispatcher/utils/compression.py"
          - "lava_dispatcher/utils/contextmanager.py"
          - "lava_dispatcher/utils/decorator.py"
          - "lava_dispatcher/utils/ext4.py"
          - "lava_dispatcher/utils/filesystem.py"
          - "lava_dispatcher/utils/installers.py"
          - "lava_dispatcher/utils/network.py"
          - "lava_dispatcher/utils/shell.py"
          - "lava_dispatcher/utils/strings.py"
          - "lava_dispatcher/utils/vcs.py"
        pass_filenames: false
        always_run: true


exclude: "^tests/lava_dispatcher/kernel-.*txt$|uv.lock"
minimum_pre_commit_version: "4.6.0"

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: debug-statements
      # Exclude LAVA automation SSH private key
      - id: detect-private-key
        exclude: |
          (?x)^(lava_dispatcher/dynamic_vm_keys/lava)$
      - id: check-toml
      # Uses yaml.parse() for syntax-only validation
      # The duplicated keys are intentional in LAVA test job definitions
      - id: check-yaml
        args: [ '--unsafe' ]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    - id: pyupgrade
      args: ["--py311-plus"]

  # - repo: https://github.com/UnknownPlatypus/djangofmt-pre-commit
  #   rev: v0.2.11
  #   hooks:
  #     - id: djangofmt

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.31.1
    hooks:
      - id: django-upgrade
        args: ["--target-version", "4.2"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [ "--fix", "--exit-non-zero-on-fix" ]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - "tomli==2.4.1"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        additional_dependencies:
          - "bandit[toml]"
        args:
          - "--configfile=pyproject.toml"
          - "--severity-level=medium"

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.1
    hooks:
      - id: pyproject-fmt

exclude: "^tests/lava_dispatcher/kernel-.*txt$|uv.lock"
minimum_pre_commit_version: "4.6.0"

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: debug-statements
      # Exclude LAVA automation SSH private key
      - id: detect-private-key
        exclude: |
          (?x)^(lava_dispatcher/dynamic_vm_keys/lava)$
      - id: check-toml
      # Uses yaml.parse() for syntax-only validation
      # The duplicated keys are intentional in LAVA test job definitions
      - id: check-yaml
        args: [ '--unsafe' ]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.1
    hooks:
      - id: pyproject-fmt
